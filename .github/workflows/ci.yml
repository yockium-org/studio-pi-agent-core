name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

env:
  CI: true

jobs:
  test:
    name: Typecheck, test, and pack smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Verify packed package can be consumed
        run: npm run pack:smoke
